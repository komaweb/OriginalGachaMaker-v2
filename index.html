<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>

Original Gacha Maker

</title>

<link
    rel="stylesheet"
    href="style.css">

</head>

<body>

<div id="app">

<header class="header">

<h1>

Original Gacha Maker

</h1>

</header>

<nav class="tab-bar">

<button
class="tab-button active"
data-page="home">

ホーム

</button>

<button
class="tab-button"
data-page="gacha">

ガチャ

</button>

<button
class="tab-button"
data-page="collection">

図鑑

</button>

<button
class="tab-button"
data-page="editor">

編集

</button>

<button
class="tab-button"
data-page="settings">

設定

</button>

</nav>

<main>

<section
id="home"
class="page active">

<div class="panel hero">

<h2>

Original Gacha Maker

</h2>

<p>

オリジナルキャラクターで遊べる
ガチャメーカー

</p>

</div>

<div class="panel">

<h3>

開催中のガチャ

</h3>

<div id="homeGachaList">

</div>

</div>

</section>
    
<section
id="gacha"
class="page">

<div class="panel">

<h2>

ガチャ

</h2>

</div>

</section>

<section
id="collection"
class="page">

<div class="panel">

<h2>

図鑑

</h2>

</div>

</section>

<section
id="editor"
class="page">

<div class="panel">

<h2>

ガチャシリーズ

</h2>

<input
id="seriesName"
class="text-input"
placeholder="シリーズ名">

<input
id="seriesBanner"
type="file"
accept="image/*">
    <img
    id="seriesPreview"
    class="preview-image">

<img
id="seriesPreview"
class="preview-image">

<button
id="saveSeries"
class="primary-button">

シリーズを保存

</button>

</div>

<div class="panel">

<h2>

シリーズ一覧

</h2>

<div
id="seriesList">

</div>

</div>

</section>


<section
id="settings"
class="page">

<div class="panel">

<h2>

設定

</h2>

</div>

</section>

</main>

</div>

<script
type="module"
src="script.js">

</script>

</body>

</html>
